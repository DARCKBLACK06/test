<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Sensores</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <h1>Monitor de Sensores en Tiempo Real</h1>

    <div class="sensor-grid">
        <div class="sensor-card">
            <h3>Temperatura</h3>
            <p id="temperature">-- °C</p>
        </div>

        <div class="sensor-card">
            <h3>Humedad</h3>
            <p id="humidity">-- %</p>
        </div>

        <div class="sensor-card">
            <h3>Nivel de Gas</h3>
            <p id="gas">--</p>
        </div>

        <div class="sensor-card">
            <h3>Caudal</h3>
            <p id="flowRate">-- L/min</p>
            <p>Total: <span id="totalFlow">--</span> litros</p>
        </div>

        <div class="sensor-card">
            <h3>Estado del Relé</h3>
            <p id="relayStatus">--</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="sensorChart"></canvas>
    </div>

    <div class="sensor-card alert" id="alertBox" style="display: none;">
        <h3>¡ALERTA!</h3>
        <p id="alertMessage"></p>
    </div>

    <script type="module">
        import { initApp } from './main.js';
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>

</html>
